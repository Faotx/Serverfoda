<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Dashboard ADM</title>

</head>
<body>
<header>
    <a href="menuADM.html" class="voltar">
        ← Voltar
    </a>
    <h1>Painel Administrativo</h1>
</header>
<div class="container">
<div class="cards">
    <div class="card-info">
        <h2>Total de Pedidos</h2>
        <p id="total-pedidos">0</p>
    </div>
    <div class="card-info">
        <h2>Total Arrecadado</h2>
        <p id="total-arrecadado">R$ 0.00</p>
    </div>
</div>

<h2>Pedidos Realizados</h2>

<div id="lista-pedidos"></div>

</div>
<script>

let pedidos = JSON.parse(localStorage.getItem("pedidos")) || [];
let totalPedidos = pedidos.length;
let totalArrecadado = 0;
pedidos.forEach(p => {
       if(!isNaN(Number(p.preco))){
        totalArrecadado += parseFloat(p.preco);
    }
});
console.log(pedidos);
document.getElementById("total-pedidos").innerText =
totalPedidos;
document.getElementById("total-arrecadado").innerText =
"R$ " + totalArrecadado.toFixed(2);
let lista = document.getElementById("lista-pedidos");
pedidos.forEach((p, i) => {

    lista.innerHTML += `
    <div class="pedido">
        <h3>${p.nome}</h3>
        <p><strong>Cliente:</strong> ${p.cliente}</p>
        <p><strong>Adicionais:</strong> ${p.adicionais}</p>
        <p><strong>Restrições:</strong> ${p.restricoes}</p>
        <p><strong>Status:</strong> ${p.status}</p>
        <p><strong>Preço:</strong> R$ ${p.preco}</p>
        <button onclick="finalizar(${i})">
            Finalizar Pedido
        </button>
    </div>
    `;
});

function finalizar(index){

    pedidos[index].status = "Pedido Finalizado";

    localStorage.setItem(
        "pedidos",
        JSON.stringify(pedidos)
    );

    location.reload();
}

</script>

<style>

body{
    margin:0;
    background:#f5f5f5;
    font-family:Arial;
}

header{
    background:#0b3d3b;
    color:white;
    padding:20px;
    text-align:center;
}

.container{
    padding:40px;
}
.card{
    flex:1;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 5px 20px rgba(0,0,0,0.1);
}
.card h2{
    color:#0b3d3b;
}
.pedido{
    background:white;
    margin-bottom:20px;
    padding:20px;
    border-radius:12px;
    border-left:5px solid #1f7a74;
}
.voltar{
    color:white;
    text-decoration:none;
    position:absolute;
    left:30px;
    top:25px;
    font-size:18px;
}
.cards{
    display:flex;
    gap:30px;
    margin-bottom:40px;
}

.card-info{
    flex:1;
    background:white;
    padding:30px;
    border-radius:20px;
    box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

.card-info p{
    font-size:35px;
    margin-top:15px;
    color:#0b3d3b;
    font-weight:bold;
}

.pedido{
    background:white;
    padding:20px;
    border-radius:15px;
    margin-bottom:20px;
}

.pedido button{
    margin-top:10px;
    padding:10px 20px;
    border:none;
    background:#1f7a74;
    color:white;
    border-radius:8px;
    cursor:pointer;
}

</style>

</body>
</html>
