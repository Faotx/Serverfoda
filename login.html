<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Login</title>
<link rel="stylesheet" href="login.css">
</head>

<script>
function login(){

    let nome =
    document.querySelector('input[name="nm"]').value;

    let senha =
    document.querySelector('input[name="pw"]').value;

    if(nome === "Pudim" && senha === "Pudim"){

        alert("Bem-vindo administrador!");

        window.location.href = "menuADM.html";

        return;
    }

    let usuario =
    JSON.parse(localStorage.getItem("usuario"));

    if(
        usuario &&
        usuario.nome === nome &&
        usuario.senha === senha
    ){

        alert("Login realizado!");

        window.location.href = "menu.html";

    } else {

        alert("Nome ou senha incorretos!");
    }
}

function abrirMenu(){

    let menu = document.getElementById("menu");

    if(menu.classList.contains("ativo")){

        menu.classList.remove("ativo");

    } else {

        menu.classList.add("ativo");
    }
}


</script>

<body>

<header>
    <div class="logo">Cantina</div>
    <div class="menu-mobile" onclick="abrirMenu()">
    ☰
</div>
    <nav id="menu">
        <a href="menu.html">Início</a>
        <a href="pedidos.html">Pedidos</a>
        <a href="sobre.html">Sobre</a>
        <a href="cadastro.html">Cadastro</a>
    </nav>
</header>

<div class="container">
    <div class="login-box">
        <h2>Entrar</h2>
        
            <div class="input-group">
                <input type="text" name="nm" required>
                <label>Nome</label>
            </div>

            <div class="input-group">
                <input type="password" name="pw" required>
                <label>Senha</label>
            </div>
            
            <button type="button" onclick="login()">
                Entrar
            </button>

            <p>Não possui conta? <a href="cadastro.html">Cadastre-se</a></p>
        </form>
    </div>
</div>


<style>
    * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    background: url('https://images.unsplash.com/photo-1495195134817-aeb325a55b65') no-repeat center/cover;
}

header {
    background: #0b3d3b;
    color: white;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 40px;
}

.logo {
    font-size: 28px;
    font-weight: bold;
}

nav a {
    color: white;
    text-decoration: none;
    margin-left: 25px;
}

nav a:hover {
    border-bottom: 2px solid #c8e6c9;
}

.container {
    display: flex;
    justify-content: center;
    align-items: center;
    height: calc(100vh - 70px);
}

.login-box {
    background: white;
    padding: 40px;
    width: 350px;
    border-radius: 12px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.2);
    text-align: center;
}

.login-box h2 {
    margin-bottom: 25px;
    color: #0b3d3b;
}

.input-group {
    position: relative;
    margin-bottom: 25px;
}

.input-group input {
    width: 100%;
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 6px;
    outline: none;
}

.input-group label {
    position: absolute;
    left: 10px;
    top: 10px;
    color: #777;
    transition: 0.3s;
    pointer-events: none;
}

.input-group input:focus + label,
.input-group input:valid + label {
    top: -10px;
    left: 8px;
    background: white;
    font-size: 12px;
    color: #0b3d3b;
    padding: 0 5px;
}

button {
    width: 100%;
    padding: 12px;
    background: #1f7a74;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 15px;
    transition: 0.3s;
}

button:hover {
    background: #145c58;
}

.login-box p {
    margin-top: 15px;
    font-size: 14px;
}

.login-box a {
    color: #1f7a74;
    text-decoration: none;
    font-weight: bold;
}
.menu-mobile{
        margin:10px 0;
        text-align:center;
    }
    .container{
        flex-direction:column;
        align-items:center;
    }
    #lista{
        flex-direction:column;
        align-items:center;
    }
    .card,
    .item,
    .pedido{
        width:90%;
    }
    .modal-content{
        flex-direction:column;
        width:90%;
    }
    .lado-esquerdo img{
        width:100%;
    }
    .overlay h1{
        font-size:28px;
    }
    .overlay p{
        font-size:15px;
    }
</style>

</body>
</html>
